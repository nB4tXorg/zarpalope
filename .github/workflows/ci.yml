name: CI

on:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y cmake gcc g++ gfortran ninja-build

      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}
          path: build/
          retention-days: 1

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: build
    strategy:
      matrix:
        os: [ubuntu-latest]
    steps:
      - name: Install runtime dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y libgfortran5

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-${{ matrix.os }}
          path: build/

      - name: Fix permissions on test executables
        run: chmod +x build/tests/test_cpp_hello build/tests/test_fortran_hello

      - name: Run tests
        run: ctest --test-dir build -V --output-junit test-report.xml --output-log test-output.log

      - name: Summarize test results
        if: always()
        run: |
          python3 - <<'EOF'
          import re, os

          try:
              log = open("test-output.log").read()
          except FileNotFoundError:
              log = ""

          lines = log.splitlines()
          tests = []
          for line in lines:
              m = re.search(
                  r'^\s*(\d+)/(\d+)\s+Test\s+#\d+:\s+(\S+)\s+\.+\s+(Passed|Failed)\s+([\d.]+)\s+sec',
                  line,
              )
              if m:
                  tests.append(
                      {
                          "num": m.group(1),
                          "total": m.group(2),
                          "name": m.group(3),
                          "status": m.group(4),
                          "duration": m.group(5),
                      }
                  )

          passed = sum(1 for t in tests if t["status"] == "Passed")
          failed = sum(1 for t in tests if t["status"] == "Failed")
          total = len(tests)
          overall_emoji = "🎉" if failed == 0 else "💥"

          summary_path = os.environ.get("GITHUB_STEP_SUMMARY", "/dev/stdout")
          with open(summary_path, "a") as f:
              f.write(f"## {overall_emoji} Test Results\n\n")
              if total == 0:
                  f.write("⚠️ No test results found in `test-output.log`.\n")
              else:
                  status_line = f"**✅ {passed}/{total} passed**"
                  if failed:
                      status_line += f" &nbsp;·&nbsp; **❌ {failed} failed**"
                  f.write(status_line + "\n\n")
                  f.write("| \# | Test | Status | Duration |\n")
                  f.write("|-----|------|:------:|----------:|\n")
                  for t in tests:
                      emoji = "✅" if t["status"] == "Passed" else "❌"
                      f.write(
                          f"| {t['num']}/{t['total']} | `{t['name']}` | {emoji} {t['status']} | {t['duration']} s |\n"
                      )
                  f.write("\n")
                  for line in reversed(lines):
                      if "tests passed" in line or "test passed" in line:
                          f.write(f"> 📋 {line.strip()}\n")
                          break
          EOF

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-${{ matrix.os }}
          path: |
            test-report.xml
            test-output.log
          retention-days: 1

name: CI

on:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
    steps:
      - uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y cmake gcc g++ gfortran ninja-build

      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build-${{ matrix.os }}
          path: build/
          retention-days: 1

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: build
    strategy:
      matrix:
        os: [ubuntu-latest]
    steps:
      - name: Install runtime dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y libgfortran5

      - name: Download build artifacts
        uses: actions/download-artifact@v7
        with:
          name: build-${{ matrix.os }}
          path: build/

      - name: Fix permissions on test executables
        run: chmod +x build/tests/test_cpp_hello build/tests/test_fortran_hello

      - name: Run tests
        run: ctest --test-dir build -V --output-junit test-report.xml --output-log test-output.log

      - name: Summarize test results
        if: always()
        run: |
          python3 - <<'EOF'
          import re, os

          try:
              log = open("test-output.log").read()
          except FileNotFoundError:
              log = ""

          summary_path = os.environ.get("GITHUB_STEP_SUMMARY", "/dev/stdout")
          with open(summary_path, "a") as f:
              # Parse the conclusion line: "N% tests passed, M tests failed out of T"
              m = re.search(r'(\d+)% tests passed,\s+(\d+) tests? failed out of (\d+)', log)
              if m:
                  failed = int(m.group(2))
                  total = int(m.group(3))
                  passed = total - failed
                  emoji = "🎉" if failed == 0 else "💥"
                  f.write(f"## {emoji} CTest Results\n\n")
                  if failed == 0:
                      f.write(f"**✅ All {total} tests passed!**\n")
                  else:
                      f.write(f"**✅ {passed}/{total} passed** &nbsp;·&nbsp; **❌ {failed} failed**\n")
                  t = re.search(r'Total Test time \(real\)\s*=\s*([\d.]+)\s*sec', log)
                  if t:
                      f.write(f"\n> ⏱️ Total test time: {t.group(1)} s\n")
              else:
                  f.write("## ⚠️ CTest Results\n\nNo test summary found in `test-output.log`.\n")
          EOF

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-report-${{ matrix.os }}
          path: |
            test-report.xml
            test-output.log
          retention-days: 1
